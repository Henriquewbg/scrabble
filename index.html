<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a0e00" />
  <meta name="description" content="Scrabble Score — Placar manual de Scrabble" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <title>Scrabble Score</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0800;
      --bg2: #1a1000;
      --wood: #8B5E3C;
      --wood-light: #C4883C;
      --cream: #F5E6C8;
      --cream-dim: #c4b08a;
      --gold: #D4AF37;
      --gold-light: #F4CF57;
      --letter-bg: #F0DFB0;
      --letter-shadow: #8B6914;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Crimson Pro', serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(139,94,60,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(212,175,55,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 0 1rem 5rem;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 2rem 0 1.2rem;
    }

    .logo-tiles {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin-bottom: 0.5rem;
    }

    .logo-tile {
      width: 36px; height: 36px;
      background: var(--letter-bg);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 1.2rem;
      color: #2a1a00;
      box-shadow: 0 3px 0 var(--letter-shadow), 0 4px 8px rgba(0,0,0,0.5);
      position: relative;
      animation: tileAppear 0.4s ease both;
    }

    .logo-tile span.pts {
      font-size: 0.4rem;
      font-family: 'Crimson Pro', serif;
      position: absolute;
      bottom: 2px; right: 3px;
      color: #5a3a00;
      font-weight: 600;
    }

    @keyframes tileAppear {
      from { transform: translateY(-16px) rotateX(40deg); opacity: 0; }
      to   { transform: none; opacity: 1; }
    }
    .logo-tile:nth-child(1){animation-delay:.05s}
    .logo-tile:nth-child(2){animation-delay:.1s}
    .logo-tile:nth-child(3){animation-delay:.15s}
    .logo-tile:nth-child(4){animation-delay:.2s}
    .logo-tile:nth-child(5){animation-delay:.25s}
    .logo-tile:nth-child(6){animation-delay:.3s}
    .logo-tile:nth-child(7){animation-delay:.35s}

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 0.85rem;
      color: var(--cream-dim);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      font-weight: 400;
    }

    /* CARD */
    .card {
      background: linear-gradient(135deg, rgba(26,16,0,0.95), rgba(20,12,0,0.98));
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 12px;
      padding: 1.4rem;
      margin-bottom: 1rem;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.5;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
      opacity: 0.9;
    }

    /* SETUP */
    .setup-screen { display: flex; flex-direction: column; }
    .game-screen  { display: none; flex-direction: column; }

    .qty-row {
      display: flex; align-items: center; justify-content: center; gap: 1.5rem;
      padding: 0.5rem 0 0.8rem;
    }
    .qty-btn {
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid rgba(212,175,55,0.35);
      background: transparent;
      color: var(--gold);
      font-size: 1.4rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      font-family: 'Playfair Display', serif;
    }
    .qty-btn:hover { background: rgba(212,175,55,0.1); }
    .qty-num {
      font-family: 'Playfair Display', serif;
      font-size: 3rem; font-weight: 900;
      color: var(--gold-light);
      min-width: 2rem; text-align: center;
    }

    .names-grid { display: flex; flex-direction: column; gap: 8px; }
    .name-row   { display: flex; align-items: center; gap: 10px; }

    .avatar-sm {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700;
      font-family: 'Playfair Display', serif;
      flex-shrink: 0;
    }

    input[type="text"], input[type="number"] {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 8px;
      color: var(--cream);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      padding: 0.5rem 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    input:focus { border-color: rgba(212,175,55,0.7); }
    input::placeholder { color: rgba(196,176,138,0.3); }

    .btn {
      border: none; border-radius: 8px; cursor: pointer;
      font-family: 'Playfair Display', serif;
      font-weight: 700; letter-spacing: 0.08em;
      transition: all 0.15s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--wood-light));
      color: #1a0e00;
      padding: 0.75rem;
      font-size: 0.95rem;
      width: 100%;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:active { filter: brightness(0.95); transform: scale(0.99); }

    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(212,175,55,0.25);
      color: var(--cream-dim);
      padding: 0.5rem 0.9rem;
      font-size: 0.8rem;
    }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

    /* PLACAR */
    .scoreboard { display: flex; flex-direction: column; gap: 8px; margin-bottom: 0; }

    .player-row {
      display: flex; align-items: center; gap: 12px;
      padding: 0.85rem 1rem;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(212,175,55,0.1);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .player-row.active-turn {
      border-color: rgba(212,175,55,0.55);
      background: rgba(212,175,55,0.06);
    }
    .player-row .av {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
    }
    .player-row .info { flex: 1; min-width: 0; }
    .player-row .pname {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem; color: var(--cream);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .player-row .phist {
      font-size: 0.7rem; color: var(--cream-dim); opacity: 0.5;
      margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .player-row .pscore {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem; font-weight: 900;
      color: var(--gold-light);
    }
    .player-row.active-turn .pscore { color: var(--gold-light); }
    .turn-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
      box-shadow: 0 0 6px rgba(212,175,55,0.6);
    }

    /* PAINEL ADICIONAR */
    .add-panel {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 12px;
      padding: 1.2rem;
      margin-bottom: 1rem;
    }
    .add-panel .panel-label {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.8;
      margin-bottom: 0.6rem;
      font-family: 'Playfair Display', serif;
    }
    .turn-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--cream);
      margin-bottom: 0.9rem;
    }

    .pts-row {
      display: flex; align-items: center; gap: 0.6rem;
      margin-bottom: 0.8rem;
    }
    .pts-row .qty-btn { width: 40px; height: 40px; font-size: 1.2rem; }
    .pts-row input[type="number"] {
      font-size: 2rem;
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      text-align: center;
      color: var(--gold-light);
      flex: 1;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.2), transparent);
      margin: 0.8rem 0;
    }

    /* HISTÓRICO */
    .history-list { display: flex; flex-direction: column; gap: 5px; max-height: 180px; overflow-y: auto; }
    .history-list::-webkit-scrollbar { width: 3px; }
    .history-list::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.2); border-radius: 2px; }

    .hist-item {
      display: flex; align-items: center; gap: 8px;
      padding: 0.45rem 0.7rem;
      background: rgba(0,0,0,0.3);
      border-radius: 6px;
      border: 1px solid rgba(212,175,55,0.07);
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform: translateX(-8px); } to { opacity:1; transform:none; } }

    .hist-av {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.55rem; font-weight: 700;
      font-family: 'Playfair Display', serif;
      flex-shrink: 0;
    }
    .hist-name { flex: 1; font-size: 0.82rem; color: var(--cream-dim); }
    .hist-pts { font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 700; color: var(--gold); }
    .hist-del {
      background: none; border: none; color: rgba(178,34,34,0.45);
      cursor: pointer; font-size: 0.85rem; padding: 0 2px; transition: color 0.15s;
    }
    .hist-del:hover { color: #e05050; }

    /* FOOTER BTNS */
    .footer-row { display: flex; gap: 0.6rem; }
    .footer-row .btn-ghost { flex: 1; text-align: center; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 5rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(26,16,0,0.96);
      border: 1px solid rgba(212,175,55,0.35);
      color: var(--cream);
      padding: 0.6rem 1.2rem;
      border-radius: 30px;
      font-family: 'Crimson Pro', serif;
      font-size: 0.9rem;
      z-index: 999;
      transition: transform 0.3s;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(10,6,0,0.97);
      border-top: 1px solid rgba(212,175,55,0.15);
      display: flex; z-index: 100;
      backdrop-filter: blur(10px);
    }
    .nav-btn {
      flex: 1; padding: 0.8rem 0;
      background: none; border: none;
      color: rgba(196,176,138,0.45);
      font-family: 'Crimson Pro', serif;
      font-size: 0.65rem; letter-spacing: 0.08em;
      text-transform: uppercase; cursor: pointer;
      transition: color 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .nav-btn .icon { font-size: 1.2rem; display: block; }
    .nav-btn.active { color: var(--gold); }

    /* PAGES */
    .page { display: none; }
    .page.active { display: block; }

    /* SETUP page */
    #page-setup .card-title { margin-bottom: 0.4rem; }

    /* LEADER badge */
    .leader-crown {
      font-size: 0.75rem;
      margin-left: 4px;
      opacity: 0.9;
    }
  </style>
</head>
<body>

<div class="container">

  <header>
    <div class="logo-tiles">
      <div class="logo-tile">S<span class="pts">1</span></div>
      <div class="logo-tile">C<span class="pts">3</span></div>
      <div class="logo-tile">R<span class="pts">1</span></div>
      <div class="logo-tile">A<span class="pts">1</span></div>
      <div class="logo-tile">B<span class="pts">3</span></div>
      <div class="logo-tile">L<span class="pts">1</span></div>
      <div class="logo-tile">E<span class="pts">1</span></div>
    </div>
    <h1>Score Keeper</h1>
  </header>

  <!-- SETUP -->
  <div class="page active" id="page-setup">
    <div class="card">
      <div class="card-title">✦ Quantos jogadores?</div>
      <div class="qty-row">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <span class="qty-num" id="qtyNum">2</span>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">✦ Nomes</div>
      <div class="names-grid" id="namesGrid"></div>
    </div>

    <button class="btn btn-primary" onclick="startGame()">Iniciar Jogo ✦</button>
  </div>

  <!-- JOGO -->
  <div class="page" id="page-game">

    <div class="card">
      <div class="card-title">✦ Placar</div>
      <div class="scoreboard" id="scoreboard"></div>
    </div>

    <div class="add-panel" id="addPanel">
      <p class="panel-label">Rodada atual</p>
      <p class="turn-name" id="turnName">—</p>
      <div class="pts-row">
        <button class="qty-btn" onclick="changePts(-5)">−5</button>
        <input type="number" id="ptsInput" value="0" min="0" />
        <button class="qty-btn" onclick="changePts(5)">+5</button>
      </div>
      <button class="btn btn-primary" onclick="confirmRound()">Confirmar ✓</button>
    </div>

    <div class="card" id="histCard" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem">
        <span class="card-title" style="margin:0">✦ Histórico</span>
        <button class="btn-ghost btn" onclick="clearHistory()" style="padding:0.3rem 0.7rem;font-size:0.7rem">Limpar</button>
      </div>
      <div class="history-list" id="histList"></div>
    </div>

    <div class="footer-row" style="margin-top:0.2rem">
      <button class="btn btn-ghost" onclick="resetGame()">↺ Zerar pontos</button>
      <button class="btn btn-ghost" onclick="switchPage('setup')">+ Novo jogo</button>
    </div>

  </div>

</div><!-- container -->

<!-- NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-setup" onclick="switchPage('setup')">
    <span class="icon">⚙</span>Configurar
  </button>
  <button class="nav-btn" id="nav-game" onclick="switchPage('game')">
    <span class="icon">👑</span>Jogo
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const PLAYER_COLORS = [
  { bg:'#C4883C', text:'#1a0800' },
  { bg:'#4a7c9e', text:'#f0f8ff' },
  { bg:'#7a4e9e', text:'#f5eeff' },
  { bg:'#4e9e6a', text:'#eefff4' },
  { bg:'#9e4e4e', text:'#fff0f0' },
  { bg:'#9e8a4e', text:'#fffaee' },
];

let qty = 2;
let players = [];
let activeIdx = 0;
let history = [];
let gameStarted = false;

try {
  const s = localStorage.getItem('scrabble_manual');
  if (s) { const d = JSON.parse(s); qty=d.qty||2; players=d.players||[]; activeIdx=d.activeIdx||0; history=d.history||[]; gameStarted=d.gameStarted||false; }
} catch(e){}

function save() {
  try { localStorage.setItem('scrabble_manual', JSON.stringify({qty,players,activeIdx,history,gameStarted})); } catch(e){}
}

function initials(name) {
  return name.trim().split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase() || '?';
}

function changeQty(d) {
  qty = Math.max(2, Math.min(6, qty + d));
  document.getElementById('qtyNum').textContent = qty;
  renderNames();
}

function renderNames() {
  const grid = document.getElementById('namesGrid');
  grid.innerHTML = '';
  for (let i = 0; i < qty; i++) {
    const c = PLAYER_COLORS[i % PLAYER_COLORS.length];
    const row = document.createElement('div');
    row.className = 'name-row';
    const saved = players[i]?.name || '';
    row.innerHTML = `
      <div class="avatar-sm" style="background:${c.bg};color:${c.text}">${initials(saved || `J${i+1}`)}</div>
      <input type="text" id="nInput${i}" value="${saved}" placeholder="Jogador ${i+1}" oninput="updateAv(${i},this.value)" />
    `;
    grid.appendChild(row);
  }
}

function updateAv(i, val) {
  const avs = document.querySelectorAll('#namesGrid .avatar-sm');
  if (avs[i]) avs[i].textContent = initials(val || `J${i+1}`);
}

function startGame() {
  players = [];
  for (let i = 0; i < qty; i++) {
    const el = document.getElementById(`nInput${i}`);
    const name = (el ? el.value.trim() : '') || `Jogador ${i+1}`;
    const prev = players[i];
    players.push({ name, score: 0, rounds: [], color: PLAYER_COLORS[i % PLAYER_COLORS.length] });
  }
  activeIdx = 0;
  history = [];
  gameStarted = true;
  save();
  switchPage('game');
}

function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.getElementById(`nav-${page}`).classList.add('active');
  if (page === 'game') {
    if (!gameStarted && players.length === 0) { startGame(); return; }
    renderGame();
  }
  if (page === 'setup') renderNames();
}

function renderGame() {
  const board = document.getElementById('scoreboard');
  board.innerHTML = '';
  const maxScore = Math.max(...players.map(p=>p.score));

  players.forEach((p, i) => {
    const isActive = i === activeIdx;
    const isLeader = p.score === maxScore && p.score > 0;
    const histStr = p.rounds.slice(-5).reverse().map(r => (r>=0?'+':'')+r).join('  ');
    const row = document.createElement('div');
    row.className = 'player-row' + (isActive ? ' active-turn' : '');
    row.onclick = () => { activeIdx = i; save(); renderGame(); };
    row.innerHTML = `
      ${isActive ? '<div class="turn-dot"></div>' : '<div style="width:8px"></div>'}
      <div class="av" style="background:${p.color.bg};color:${p.color.text}">${initials(p.name)}</div>
      <div class="info">
        <div class="pname">${p.name}${isLeader ? '<span class="leader-crown">♛</span>' : ''}</div>
        ${histStr ? `<div class="phist">${histStr}</div>` : '<div class="phist">sem rodadas</div>'}
      </div>
      <div class="pscore">${p.score}</div>
    `;
    board.appendChild(row);
  });

  document.getElementById('turnName').textContent = `Vez de ${players[activeIdx].name}`;
  document.getElementById('ptsInput').value = 0;
  renderHistory();
}

function changePts(d) {
  const inp = document.getElementById('ptsInput');
  inp.value = Math.max(0, (parseInt(inp.value)||0) + d);
}

function confirmRound() {
  const pts = parseInt(document.getElementById('ptsInput').value) || 0;
  players[activeIdx].score += pts;
  players[activeIdx].rounds.push(pts);
  history.unshift({ playerIdx: activeIdx, name: players[activeIdx].name, pts, color: players[activeIdx].color });
  activeIdx = (activeIdx + 1) % players.length;
  save();
  renderGame();
  showToast(`+${pts} para ${history[0].name}!`);
}

function renderHistory() {
  const card = document.getElementById('histCard');
  const list = document.getElementById('histList');
  if (!history.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  list.innerHTML = '';
  history.slice(0, 20).forEach((h, i) => {
    const el = document.createElement('div');
    el.className = 'hist-item';
    el.innerHTML = `
      <div class="hist-av" style="background:${h.color.bg};color:${h.color.text}">${initials(h.name)}</div>
      <span class="hist-name">${h.name}</span>
      <span class="hist-pts">+${h.pts}</span>
      <button class="hist-del" onclick="undoEntry(${i})">✕</button>
    `;
    list.appendChild(el);
  });
}

function undoEntry(i) {
  const h = history[i];
  players[h.playerIdx].score = Math.max(0, players[h.playerIdx].score - h.pts);
  players[h.playerIdx].rounds.pop();
  history.splice(i, 1);
  save();
  renderGame();
}

function clearHistory() {
  history = [];
  save();
  renderHistory();
}

function resetGame() {
  showConfirm('Zerar todos os pontos?', () => {
    players.forEach(p => { p.score = 0; p.rounds = []; });
    history = [];
    activeIdx = 0;
    save();
    renderGame();
    showToast('Jogo zerado!');
  });
}

function showConfirm(msg, onYes) {
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmModal').style.display = 'flex';
  document.getElementById('confirmYes').onclick = () => {
    document.getElementById('confirmModal').style.display = 'none';
    onYes();
  };
  document.getElementById('confirmNo').onclick = () => {
    document.getElementById('confirmModal').style.display = 'none';
  };
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2200);
}

// Init
renderNames();
if (gameStarted && players.length) {
  switchPage('game');
} else {
  switchPage('setup');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>

<!-- CONFIRM MODAL -->
<div id="confirmModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;align-items:center;justify-content:center;padding:1rem">
  <div style="background:#1a1000;border:1px solid rgba(212,175,55,0.4);border-radius:14px;padding:1.5rem;max-width:300px;width:100%;text-align:center">
    <p id="confirmMsg" style="font-family:'Crimson Pro',serif;font-size:1.05rem;color:#F5E6C8;margin-bottom:1.2rem;line-height:1.5"></p>
    <div style="display:flex;gap:0.7rem">
      <button id="confirmNo" style="flex:1;padding:0.7rem;background:transparent;border:1px solid rgba(212,175,55,0.25);border-radius:8px;color:#c4b08a;font-family:'Playfair Display',serif;font-size:0.9rem;cursor:pointer">Cancelar</button>
      <button id="confirmYes" style="flex:1;padding:0.7rem;background:linear-gradient(135deg,#D4AF37,#C4883C);border:none;border-radius:8px;color:#1a0e00;font-family:'Playfair Display',serif;font-weight:700;font-size:0.9rem;cursor:pointer">Zerar</button>
    </div>
  </div>
</div>
